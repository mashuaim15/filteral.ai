version: '3.8'

services:
  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"  # Expose on different port to avoid conflicts
    environment:
      POSTGRES_DB: dailyrec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - daily-recommend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: 
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./web/env/.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./worker:/app  # Mount source for hot reload
      - /app/__pycache__  # Exclude pycache
    shm_size: '2gb'
    command: uvicorn app:app --host 0.0.0.0 --port 3001 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: builder  # Use builder stage for dev
    ports:
      - "3000:3000"
    env_file:
      - ./web/env/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/dailyrec
      - WORKER_URL=http://worker:3001
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./web:/app  # Mount source for hot reload
      - /app/node_modules  # Exclude node_modules
      - /app/.next  # Exclude .next build folder
    depends_on:
      db:
        condition: service_healthy
      worker:
        condition: service_started
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  daily-recommend_postgres_data:
    external: true
